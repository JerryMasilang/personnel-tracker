<!DOCTYPE html>
<html>
<head>
    <title>Delete Personnel</title>
</head>
<body>
    <h1>Delete Personnel</h1>

    <p>Are you sure you want to delete <strong>{{ personnel.full_name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <p>
        <a href="{% url 'personnel_list' %}">Cancel</a>
    </p>
</body>
</html>
